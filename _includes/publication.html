{% include base_path %}

{% if post.id %}
  {% assign title = post.title | markdownify | remove: "<p>" | remove: "</p>" %}
{% else %}
  {% assign title = post.title %}
{% endif %}


<div class="{{ include.type | default: "list" }}__item">
    <article class="archive__item" itemscope itemtype="http://schema.org/CreativeWork">
        <h3 class="archive__item-title" itemprop="headline">
            <a href="{{ post.paperurl }}">{{ title }}</a> <a href="{{ base_path }}{{ post.url }}" rel="permalink"><i class="fa fa-link" aria-hidden="true" title="permalink"></i><span class="sr-only">Permalink</span></a>
        </h3>
        <div><i>{{ post.authors }}</i></div>
        <div>{{ post.pubstatus }}</div>
        <div>{{post.content | markdownify | remove: "<p>" | remove: "</p>"}}</div>
    </article>
</div>
